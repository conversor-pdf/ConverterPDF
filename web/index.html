<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Converter</title>
    <style>
:root {
    --bg-main: #141418;
    --bg-card: #1E1F26;
    --bg-card-hover: #262730;
    --border-color: #2D2E37;
    --text-main: #E2E2E2;
    --text-muted: #9CA3AF;
    
    --primary-blue: #3B82F6;
    --primary-blue-hover: #2563EB;
    
    /* Format Colors */
    --color-docx: #2B579A;
    --color-xlsx: #217346;
    --color-pptx: #D24726;
    --color-png: #8B5CF6;
    --color-txt: #6B7280;
    --color-html: #F97316;
    --color-epub: #10B981;
    --color-pdf: #EF4444;

    --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: var(--font-family);
    background-color: var(--bg-main);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    user-select: none;
}

.app-container {
    display: flex;
    flex-direction: column;
    height: 100%;
}

/* Top Nav */
.top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border-color);
}

.tabs {
    display: flex;
    background-color: var(--bg-card);
    border-radius: 8px;
    padding: 4px;
    border: 1px solid var(--border-color);
}

.tab-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
}

.tab-btn:hover {
    color: var(--text-main);
}

.tab-btn.active {
    background-color: var(--primary-blue);
    color: white;
}

.icon-btn {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    color: var(--text-muted);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    font-size: 18px;
}

.icon-btn:hover {
    color: var(--text-main);
    border-color: var(--text-muted);
}

/* Content Area */
.content-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
}

.header-titles {
    margin-bottom: 24px;
}

.header-titles h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
}

.header-titles p {
    font-size: 13px;
    color: var(--text-muted);
}

/* Drop Zone */
.drop-zone {
    border: 2px dashed var(--border-color);
    border-radius: 12px;
    background-color: transparent;
    padding: 40px 20px;
    text-align: center;
    transition: 0.3s;
    margin-bottom: 16px;
}

.drop-zone.dragover {
    border-color: var(--primary-blue);
    background-color: rgba(59, 130, 246, 0.05);
}

.file-icon-wrapper {
    position: relative;
    display: inline-block;
    font-size: 48px;
    color: var(--text-muted);
    margin-bottom: 16px;
}

.plus-badge {
    position: absolute;
    bottom: 0;
    right: -4px;
    background-color: var(--primary-blue);
    color: white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border: 2px solid var(--bg-main);
}

.drop-text {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
}

.or-text {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 16px;
}

.btn-primary {
    background-color: var(--primary-blue);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.btn-primary:hover {
    background-color: var(--primary-blue-hover);
}

.btn-primary:disabled {
    background-color: #374151;
    color: #9CA3AF;
    cursor: not-allowed;
}

/* Selected File */
.selected-files-container {
    margin-bottom: 16px;
}

.selected-files-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}

.selected-files-header h3 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
}

.remove-all-btn {
    background: transparent;
    border: none;
    color: #EF4444;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
}

.remove-all-btn:hover {
    text-decoration: underline;
}

.selected-files-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 180px;
    overflow-y: auto;
    padding-right: 4px;
}

.selected-files-list::-webkit-scrollbar {
    width: 6px;
}
.selected-files-list::-webkit-scrollbar-track {
    background: var(--bg-main);
    border-radius: 4px;
}
.selected-files-list::-webkit-scrollbar-thumb {
    background: var(--border-color);
    border-radius: 4px;
}

.selected-file {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 12px;
}

.file-info {
    display: flex;
    align-items: center;
    gap: 16px;
}

.file-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: white;
}

.red-pdf { background-color: rgba(239, 68, 68, 0.1); color: var(--color-pdf); }

.file-details h3 {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
}

.file-details p {
    font-size: 12px;
    color: var(--text-muted);
}

.remove-file-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
}

.remove-file-btn:hover {
    color: white;
}

/* Formats Grid */
.section-title {
    font-size: 14px;
    font-weight: 600;
    margin: 24px 0 12px 0;
}

.formats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

.format-card {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: 0.2s;
}

.format-card:hover {
    background-color: var(--bg-card-hover);
}

.format-card.active {
    border-color: var(--primary-blue);
    background-color: rgba(59, 130, 246, 0.1);
}

.format-icon {
    font-size: 24px;
    margin-bottom: 8px;
}

.docx-icon { color: var(--color-docx); }
.xlsx-icon { color: var(--color-xlsx); }
.pptx-icon { color: var(--color-pptx); }
.png-icon { color: var(--color-png); }
.txt-icon { color: var(--color-txt); }
.html-icon { color: var(--color-html); }
.epub-icon { color: var(--color-epub); }

.format-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-main);
}

.format-ext {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
}

/* Options */
.options-container {
    margin-bottom: 24px;
}

.checkbox-label {
    display: flex;
    align-items: center;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    position: relative;
    padding-left: 28px;
    user-select: none;
}

.checkbox-label input {
    position: absolute;
    opacity: 0;
    cursor: pointer;
    height: 0;
    width: 0;
}

.checkmark {
    position: absolute;
    top: -2px;
    left: 0;
    height: 20px;
    width: 20px;
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    transition: 0.2s;
}

.checkbox-label:hover input ~ .checkmark {
    border-color: var(--text-muted);
}

.checkbox-label input:checked ~ .checkmark {
    background-color: var(--primary-blue);
    border-color: var(--primary-blue);
}

.checkmark:after {
    content: "";
    position: absolute;
    display: none;
}

.checkbox-label input:checked ~ .checkmark:after {
    display: block;
}

.checkbox-label .checkmark:after {
    left: 6px;
    top: 2px;
    width: 5px;
    height: 10px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
}

.info-icon {
    margin-left: 6px;
    font-size: 14px;
}

/* Action Button */
.action-btn {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    border-radius: 10px;
}

/* Status Bar */
.status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    border-top: 1px solid var(--border-color);
    font-size: 12px;
    color: var(--text-muted);
}

.status-left {
    display: flex;
    align-items: center;
    gap: 8px;
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background-color: #10B981; /* Green */
}

.status-dot.processing {
    background-color: #F59E0B; /* Orange */
}

.status-dot.error {
    background-color: #EF4444; /* Red */
}

.status-right {
    display: flex;
    gap: 16px;
}

/* History List */
.history-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.history-item {
    display: flex;
    align-items: center;
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px;
    transition: 0.2s;
}

.history-item:hover {
    background-color: var(--bg-card-hover);
}

.history-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: white;
    margin-right: 16px;
}

.history-icon.docx-icon { background-color: rgba(43, 87, 154, 0.1); color: var(--color-docx); }
.history-icon.xlsx-icon { background-color: rgba(33, 115, 70, 0.1); color: var(--color-xlsx); }
.history-icon.pptx-icon { background-color: rgba(210, 71, 38, 0.1); color: var(--color-pptx); }
.history-icon.png-icon { background-color: rgba(139, 92, 246, 0.1); color: var(--color-png); }
.history-icon.txt-icon { background-color: rgba(107, 114, 128, 0.1); color: var(--color-txt); }
.history-icon.html-icon { background-color: rgba(249, 115, 22, 0.1); color: var(--color-html); }
.history-icon.epub-icon { background-color: rgba(16, 185, 129, 0.1); color: var(--color-epub); }

.history-details {
    flex: 1;
}

.history-details h3 {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
}

.history-details p {
    font-size: 12px;
    color: var(--text-muted);
}

.history-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-right: 24px;
    min-width: 150px;
}

.badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
}

.badge.docx-badge { background-color: var(--color-docx); color: white; }
.badge.xlsx-badge { background-color: var(--color-xlsx); color: white; }
.badge.pptx-badge { background-color: var(--color-pptx); color: white; }
.badge.png-badge { background-color: var(--color-png); color: white; }
.badge.txt-badge { background-color: var(--color-txt); color: white; }
.badge.html-badge { background-color: var(--color-html); color: white; }
.badge.epub-badge { background-color: var(--color-epub); color: white; }

.history-size-time {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
}

.history-actions {
    display: flex;
    gap: 8px;
}

/* Utilities */
.hidden {
    display: none !important;
}

</style>

<body>
    <div class="app-container">
        <!-- Top Navigation -->

                <div class="history-list" id="history-list">
                    <!-- History items will be populated here -->

                    <div class="history-item">

    <script>
// Tab Navigation
const tabBtns = document.querySelectorAll('.tab-btn');
const tabContents = document.querySelectorAll('.tab-content');
const historyCount = document.getElementById('history-count');

tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        // Remove active class from all
        tabBtns.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.style.display = 'none');
        
        // Add active class to clicked
        btn.classList.add('active');
        const tabId = btn.getAttribute('data-tab');
        document.getElementById(tabId).style.display = 'block';

        if (tabId === 'history-tab') {
            historyCount.style.display = 'inline';
            loadHistory();
        } else {
            historyCount.style.display = 'none';
        }
    });
});

// Format Selection
const formatCards = document.querySelectorAll('.format-card');
let selectedFormat = 'docx';

formatCards.forEach(card => {
    card.addEventListener('click', () => {
        formatCards.forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        selectedFormat = card.getAttribute('data-format');
    });
});

// File Upload
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const convertBtn = document.getElementById('convert-btn');

let currentFiles = [];

// Drag and drop events
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, preventDefaults, false);
});

function preventDefaults(e) {
    e.preventDefault();
    e.stopPropagation();
}

['dragenter', 'dragover'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
});

['dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
});

dropZone.addEventListener('drop', handleDrop, false);

function handleDrop(e) {
    const dt = e.dataTransfer;
    const files = dt.files;
    handleFiles(files);
}

fileInput.addEventListener('change', function() {
    handleFiles(this.files);
});

function handleFiles(files) {
    if (files.length > 0) {
        let hasPdfs = false;
        for(let i=0; i<files.length; i++) {
            const file = files[i];
            if (file.name.toLowerCase().endsWith('.pdf')) {
                hasPdfs = true;
                const id = Date.now() + Math.random().toString(36).substr(2, 9);
                currentFiles.push({
                    id: id,
                    name: file.name,
                    size: file.size,
                    path: file.path || null,
                    fileObj: file.path ? null : file
                });
            }
        }
        if (hasPdfs) {
            updateFileUi();
        } else {
            alert('Por favor, selecione apenas arquivos PDF.');
        }
    }
}

// Expõe a função para o global para que o onclick do HTML funcione
window.removeFile = function(id) {
    currentFiles = currentFiles.filter(f => f.id !== id);
    if (currentFiles.length === 0) {
        document.getElementById('file-input').value = '';
        dropZone.style.display = 'block';
        document.getElementById('selected-files-container').style.display = 'none';
        convertBtn.disabled = true;
    } else {
        updateFileUi();
    }
}

document.getElementById('remove-all-btn').addEventListener('click', () => {
    currentFiles = [];
    document.getElementById('file-input').value = '';
    dropZone.style.display = 'block';
    document.getElementById('selected-files-container').style.display = 'none';
    convertBtn.disabled = true;
});

function updateFileUi() {
    const container = document.getElementById('selected-files-container');
    const list = document.getElementById('selected-files-list');
    const countEl = document.getElementById('file-count');
    
    countEl.textContent = currentFiles.length;
    list.innerHTML = '';
    
    currentFiles.forEach(file => {
        let sizeStr = '';
        if (file.size > 1024 * 1024) {
            sizeStr = (file.size / (1024 * 1024)).toFixed(1) + ' MB';
        } else {
            sizeStr = (file.size / 1024).toFixed(1) + ' KB';
        }
        
        const html = `
            <div class="selected-file">
                <div class="file-info">
                    <div class="file-icon red-pdf">
                        <i class="ph-fill ph-file-pdf"></i>
                    </div>
                    <div class="file-details">
                        <h3>${file.name}</h3>
                        <p>${sizeStr}</p>
                    </div>
                </div>
                <button class="remove-file-btn" onclick="removeFile('${file.id}')">
                    <i class="ph ph-x"></i>
                </button>
            </div>
        `;
        list.insertAdjacentHTML('beforeend', html);
    });
    
    dropZone.style.display = 'none';
    container.style.display = 'block';
    convertBtn.disabled = false;
}

// Setting Button
document.querySelector('.settings-btn').addEventListener('click', async () => {
    // Call python to select destination folder
    const folder = await eel.select_output_folder()();
    if (folder) {
        showStatus(`Pasta de destino definida para: ${folder}`, 'Pronto', false);
    }
});

function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result.split(',')[1]);
        reader.onerror = e => reject(e);
        reader.readAsDataURL(file);
    });
}

// Convert Button
convertBtn.addEventListener('click', async () => {
    if (currentFiles.length === 0) return;
    
    const ocrEnabled = document.getElementById('ocr-checkbox').checked;
    
    convertBtn.disabled = true;
    
    let successCount = 0;
    let errorCount = 0;
    
    for (let i = 0; i < currentFiles.length; i++) {
        const file = currentFiles[i];
        
        convertBtn.innerHTML = `<i class="ph ph-spinner ph-spin"></i> Convertendo (${i+1}/${currentFiles.length})...`;
        showStatus(`Processando arquivo ${i+1} de ${currentFiles.length}...`, 'Convertendo...', true);
        
        try {
            let result;
            if (file.path) {
                // Send path directly
                result = await eel.convert_pdf(file.path, selectedFormat, ocrEnabled)();
            } else {
                // We need to read the file and send as base64
                const base64Data = await readFileAsBase64(file.fileObj);
                result = await eel.convert_pdf_base64(file.name, base64Data, selectedFormat, ocrEnabled)();
            }
            
            if (result.success) {
                successCount++;
            } else {
                errorCount++;
                console.error(`Erro ao converter ${file.name}: ${result.error}`);
            }
        } catch (e) {
            console.error(e);
            errorCount++;
        }
    }
    
    // Finished all
    if (errorCount === 0) {
        showStatus(`${successCount} arquivos convertidos com sucesso`, 'Pronto', false);
    } else {
        showStatus(`Concluído: ${successCount} sucessos, ${errorCount} erros`, 'Aviso', false, true);
        alert(`Processamento concluído. ${errorCount} arquivos falharam.`);
    }
    
    convertBtn.disabled = false;
    convertBtn.innerHTML = '<i class="ph ph-arrows-clockwise"></i> Converter agora';
    
    document.querySelector('[data-tab="history-tab"]').click();
});

function showStatus(logMsg, statusMsg, isProcessing, isError = false) {
    console.log(logMsg);
    const textEl = document.getElementById('status-text');
    const dotEl = document.querySelector('.status-dot');
    
    textEl.textContent = statusMsg;
    dotEl.className = 'status-dot';
    if (isProcessing) {
        dotEl.classList.add('processing');
    } else if (isError) {
        dotEl.classList.add('error');
    }
}

// History
async function loadHistory() {
    const historyList = document.getElementById('history-list');
    historyList.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted);">Carregando...</div>';
    
    try {
        const history = await eel.get_history()();
        historyCount.textContent = `${history.length} itens`;
        
        if (history.length === 0) {
            historyList.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted);">Nenhum arquivo convertido ainda.</div>';
            return;
        }
        
        historyList.innerHTML = '';
        history.forEach(item => {
            const ext = item.format;
            let iconClass = `${ext}-icon`;
            let badgeClass = `${ext}-badge`;
            let iconElement = '';
            
            switch(ext) {
                case 'docx': iconElement = '<i class="ph-fill ph-file-doc"></i>'; break;
                case 'xlsx': iconElement = '<i class="ph-fill ph-file-xls"></i>'; break;
                case 'pptx': iconElement = '<i class="ph-fill ph-file-ppt"></i>'; break;
                case 'png': iconElement = '<i class="ph-fill ph-image"></i>'; break;
                case 'txt': iconElement = '<i class="ph-fill ph-file-text"></i>'; break;
                case 'html': iconElement = '<i class="ph-fill ph-file-code"></i>'; break;
                case 'epub': iconElement = '<i class="ph-fill ph-book-open"></i>'; break;
                default: iconElement = '<i class="ph-fill ph-file"></i>';
            }
            
            // Format time
            const date = new Date(item.timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            
            let timeStr = '';
            if (diffMins < 1) timeStr = 'Agora há pouco';
            else if (diffMins < 60) timeStr = `${diffMins} minutos atrás`;
            else if (diffHours < 24) timeStr = `${diffHours} horas atrás`;
            else timeStr = date.toLocaleDateString();

            const html = `
                <div class="history-item">
                    <div class="history-icon ${iconClass}">${iconElement}</div>
                    <div class="history-details">
                        <h3>${item.output_name}</h3>
                        <p>Convertido de ${item.original_name}</p>
                    </div>
                    <div class="history-meta">
                        <span class="badge ${badgeClass}">${ext.toUpperCase()}</span>
                        <span class="history-size-time">${item.size_str}<br>${timeStr}</span>
                    </div>
                    <div class="history-actions">
                        <button class="icon-btn" onclick="eel.open_folder('${item.output_path.replace(/\\/g, '\\\\')}')()" title="Abrir pasta"><i class="ph ph-folder-open"></i></button>
                    </div>
                </div>
            `;
            historyList.insertAdjacentHTML('beforeend', html);
        });
    } catch (e) {
        historyList.innerHTML = '<div style="text-align: center; padding: 20px; color: #EF4444;">Erro ao carregar histórico.</div>';
    }
}

// Check if Python file dialog should be used instead of HTML file input
document.querySelector('.select-file-btn').addEventListener('click', async (e) => {
    // If we want to use native Python dialog:
    e.preventDefault();
    e.stopPropagation();
    
    const filesInfo = await eel.select_pdf_file()();
    if (filesInfo && filesInfo.length > 0) {
        filesInfo.forEach(file => {
            const id = Date.now() + Math.random().toString(36).substr(2, 9);

                id: id,
                name: file.name,
                size: file.size,
                path: file.path,
                fileObj: null
            });
        });
        updateFileUi();
    }
});
